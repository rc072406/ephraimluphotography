<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ephraim Lu Photography</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <style>
        :root {
            --bg-primary: #f3f3f4;
            --text-main: #231f20;
            --sidebar-width: 300px;
            --font-serif: 'Cormorant Garamond', serif;
            --transition: 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-main);
            font-family: var(--font-serif);
            overflow-x: hidden;
        }

        /* SIDEBAR - Styled to match Page 2 */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
            width: var(--sidebar-width);
            background: url('https://lightroom.adobe.com/v2c/spaces/9629d67fbae74310a29c500e5955e5e1/assets/18929a38e65345f0b251c432aa867151/revisions/626b50bcf766438096f628e123bf9928/renditions/0be75ba6a71bebf00caf9a34831986a1') no-repeat center center;
            background-size: cover;
            display: flex;
            flex-direction: column;
            padding: 40px;
            z-index: 1000;
            transition: transform var(--transition);
        }

        .sidebar::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.35); /* Darkened to match Page 2 */
            z-index: 1;
        }

        .sidebar-content {
            position: relative;
            z-index: 2;
            height: 100%;
            display: flex;
            flex-direction: column;
            color: #fff;
        }

        .brand-logo {
            font-size: 22px;
            letter-spacing: 5px;
            text-transform: uppercase;
            text-decoration: none;
            color: #fff;
            margin-bottom: 60px;
            font-weight: 400;
        }

        .nav-links {
            list-style: none;
        }

        .nav-links li {
            margin-bottom: 25px;
        }

        .nav-links a {
            text-decoration: none;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 13px;
            transition: all 0.3s;
            padding: 5px 10px;
            border-radius: 2px;
        }

        /* Match Page 2 Active Link Shading */
        .nav-links a.active-page {
            background: rgba(255, 255, 255, 0.15);
            box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
            opacity: 1;
        }

        .nav-links a:hover {
            opacity: 0.6;
        }

        /* HERO SECTION */
        .main-hero {
            margin-left: var(--sidebar-width);
            height: 100vh;
            display: flex;
            flex-direction: column;
            transition: margin-left var(--transition);
        }

        .hero-image-container {
            flex-grow: 1;
            overflow: hidden;
            position: relative;
            background-color: #000;
        }

        .hero-image {
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: background-image 0.8s ease-in-out; 
            animation: panEffect 6s infinite alternate ease-in-out;
        }

        @keyframes panEffect {
            0% { transform: scale(1.0); }
            100% { transform: scale(1.08) translateX(-1.5%); }
        }

        .hero-footer {
            height: 220px;
            background-color: var(--bg-primary);
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 10%;
        }

        .hero-title {
            font-size: clamp(28px, 5vw, 42px);
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 300;
            margin-bottom: 20px;
        }

        .hero-cta {
            display: inline-flex;
            align-items: center;
            text-decoration: none;
            color: var(--text-main);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 12px;
            width: fit-content;
        }

        .hero-cta span {
            border-bottom: 1px solid var(--text-main);
            margin-right: 10px;
            padding-bottom: 2px;
        }

        /* FOOTER - Updated to match Page 2 exactly */
        .site-footer {
            margin-left: var(--sidebar-width);
            padding: 40px 10%;
            background-color: var(--bg-primary);
            border-top: 1px solid rgba(0,0,0,0.05);
            transition: margin-left var(--transition);
        }

        .footer-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px; /* Smaller to match page 2 */
            letter-spacing: 1px;
            text-transform: uppercase;
            opacity: 0.6; /* Lower opacity to match page 2 */
        }

        .social-links a {
            color: var(--text-main);
            text-decoration: none;
            margin-left: 20px;
            font-size: 16px; /* Matched to page 2 */
            transition: opacity 0.3s;
        }

        .social-links a:hover {
            opacity: 0.5;
        }

        /* MOBILE STYLES */
        .mobile-header {
            display: none;
            position: fixed;
            top: 0; width: 100%; height: 60px;
            background: var(--bg-primary);
            padding: 0 20px;
            align-items: center;
            justify-content: space-between;
            z-index: 1100;
            border-bottom: 1px solid #ddd;
        }

        .menu-toggle {
            cursor: pointer;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        @media (max-width: 768px) {
            .mobile-header { display: flex; }
            .sidebar { transform: translateX(-100%); width: 80%; max-width: 300px; }
            .sidebar.active { transform: translateX(0); }
            .main-hero, .site-footer { margin-left: 0; }
            .main-hero { padding-top: 60px; }
            .footer-content { flex-direction: column; gap: 20px; text-align: center; }
            .hero-footer { height: 180px; padding: 0 20px; }
            .hero-title { font-size: 24px; }
            .social-links a { margin: 0 10px; }
        }
    </style>
</head>
<body>

    <header class="mobile-header">
        <a href="index.html" style="text-decoration:none; color:var(--text-main); letter-spacing:2px; font-size:14px;">EPHRAIM LU</a>
        <div class="menu-toggle" onclick="toggleMenu()">Menu</div>
    </header>

    <nav class="sidebar" id="sidebar">
        <div class="sidebar-content">
            <a href="index.html" class="brand-logo">Ephraim Lu</a>
            <ul class="nav-links">
                <li><a href="index.html" class="active-page">Home</a></li>
                <li><a href="mywork.html">My Work</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </div>
    </nav>

    <main class="main-hero">
        <div class="hero-image-container">
            <div id="heroImage" class="hero-image"></div>
        </div>

        <div class="hero-footer">
            <h1 class="hero-title">Portfolios & Projects</h1>
            <a href="mywork.html" class="hero-cta">
                <span>View Gallery</span> &rarr;
            </a>
        </div>

        <footer class="site-footer">
            <div class="footer-content">
                <p>&copy; 2026 Ephraim Lu Photography</p>
                <div class="social-links">
                    <a href="https://www.instagram.com/ephraim.lu_08/" target="_blank" aria-label="Instagram">
                        <i class="fab fa-instagram"></i>
                    </a>
                    <a href="https://www.linkedin.com/in/ephraim-lu-749319365/" target="_blank" aria-label="LinkedIn">
                        <i class="fab fa-linkedin-in"></i>
                    </a>
                </div>
            </div>
        </footer>
    </main>

    <script>
        const images = [
            'https://lightroom.adobe.com/v2c/spaces/9629d67fbae74310a29c500e5955e5e1/assets/b37961b62f984f518943870c5429bd70/revisions/cd1e78febe5349aab7751928be681dc9/renditions/6561f08a9f532150c6b14464b46e1e07',
            'https://lightroom.adobe.com/v2c/spaces/9629d67fbae74310a29c500e5955e5e1/assets/4d7f22835cb54214826a82d3f6382982/revisions/d6fe0320d5eb488c98d59009f4c74890/renditions/0c7bbbf941a7439c5242e0d63a0fc3b5',
            'https://lightroom.adobe.com/v2c/spaces/9629d67fbae74310a29c500e5955e5e1/assets/d613b087cf3146e1bc39f3946bb73f2a/revisions/10e3846d16ce47a28f4fd966dcd13ca9/renditions/7d6da5a011ec88544cd1203548f1e98d'
        ];

        let currentIndex = 0;
        const heroEl = document.getElementById('heroImage');

        heroEl.style.backgroundImage = `url('${images[currentIndex]}')`;

        setInterval(() => {
            currentIndex = (currentIndex + 1) % images.length;
            heroEl.style.backgroundImage = `url('${images[currentIndex]}')`;
        }, 12000); 

        function toggleMenu() {
            const sidebar = document.getElementById('sidebar');
            const btn = document.querySelector('.menu-toggle');
            sidebar.classList.toggle('active');
            btn.innerHTML = sidebar.classList.contains('active') ? "Close" : "Menu";
        }
    </script>
</body>
</html>
