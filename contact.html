<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Ephraim Lu Photography</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <style>
        :root {
            --bg-primary: #f3f3f4;
            --text-main: #231f20;
            --sidebar-width: 300px;
            --font-serif: 'Cormorant Garamond', serif;
            --transition: 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-main);
            font-family: var(--font-serif);
            overflow-x: hidden;
        }

        /* SIDEBAR - Identical to Home/Work */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
            width: var(--sidebar-width);
            background: url('https://lightroom.adobe.com/v2c/spaces/9629d67fbae74310a29c500e5955e5e1/assets/18929a38e65345f0b251c432aa867151/revisions/626b50bcf766438096f628e123bf9928/renditions/0be75ba6a71bebf00caf9a34831986a1') no-repeat center center;
            background-size: cover;
            display: flex;
            flex-direction: column;
            padding: 40px;
            z-index: 1000;
            transition: transform var(--transition);
        }

        .sidebar::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.35);
            z-index: 1;
        }

        .sidebar-content {
            position: relative;
            z-index: 2;
            height: 100%;
            display: flex;
            flex-direction: column;
            color: #fff;
        }

        .brand-logo {
            font-size: 22px;
            letter-spacing: 5px;
            text-transform: uppercase;
            text-decoration: none;
            color: #fff;
            margin-bottom: 60px;
            font-weight: 400;
        }

        .nav-links {
            list-style: none;
        }

        .nav-links li {
            margin-bottom: 25px;
        }

        .nav-links a {
            text-decoration: none;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 13px;
            transition: all 0.3s;
            padding: 5px 10px;
            border-radius: 2px;
        }

        .nav-links a.active-page {
            background: rgba(255, 255, 255, 0.15);
            box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
            opacity: 1;
        }

        .nav-links a:hover {
            opacity: 0.6;
        }

        /* MAIN CONTENT AREA */
        .contact-container {
            margin-left: var(--sidebar-width);
            padding: 80px 10%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: margin-left var(--transition);
        }

        .page-title {
            font-size: 32px;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 40px;
            font-weight: 300;
        }

        /* NEW CONTENT STYLES */
        .content-placeholder {
            flex-grow: 1;
            display: flex;
            align-items: center; /* Centers vertically */
        }

        .contact-hero {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .contact-intro {
            font-size: 28px;
            margin-bottom: 40px;
            max-width: 600px;
            line-height: 1.4;
            font-weight: 300;
        }

        .mail-button {
            display: inline-flex;
            align-items: center;
            gap: 15px;
            padding: 20px 40px;
            background-color: var(--text-main);
            color: #fff;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 11px;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            border: 1px solid var(--text-main);
        }

        .mail-button i {
            font-size: 14px;
            transition: transform 0.4s ease;
        }

        .mail-button:hover {
            background-color: transparent;
            color: var(--text-main);
        }

        .mail-button:hover i {
            transform: translateX(8px) translateY(-5px);
        }

        /* GLOBAL FOOTER - Exact match to Home/Work */
        .site-footer {
            padding: 40px 0;
            background-color: var(--bg-primary);
            border-top: 1px solid rgba(0,0,0,0.05);
        }

        .footer-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            letter-spacing: 1px;
            text-transform: uppercase;
            opacity: 0.6;
        }

        .social-links a {
            color: var(--text-main);
            text-decoration: none;
            margin-left: 20px;
            font-size: 16px;
            transition: opacity 0.3s;
        }

        /* MOBILE STYLES */
        .mobile-header {
            display: none;
            position: fixed;
            top: 0; width: 100%; height: 60px;
            background: var(--bg-primary);
            padding: 0 20px;
            align-items: center;
            justify-content: space-between;
            z-index: 1100;
            border-bottom: 1px solid #ddd;
        }

        .menu-toggle {
            cursor: pointer;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        @media (max-width: 768px) {
            .mobile-header { display: flex; }
            .sidebar { transform: translateX(-100%); width: 80%; max-width: 300px; }
            .sidebar.active { transform: translateX(0); }
            .contact-container { margin-left: 0; padding-top: 100px; padding-left: 20px; padding-right: 20px; }
            .footer-content { flex-direction: column; gap: 20px; text-align: center; }
            .social-links a { margin: 0 10px; }
            
            /* Mobile adjustment for new content */
            .contact-hero {
                align-items: center;
                text-align: center;
                width: 100%;
            }
            .contact-intro {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>

    <header class="mobile-header">
        <a href="index.html" style="text-decoration:none; color:var(--text-main); letter-spacing:2px; font-size:14px;">EPHRAIM LU</a>
        <div class="menu-toggle" onclick="toggleMenu()">Menu</div>
    </header>

    <nav class="sidebar" id="sidebar">
        <div class="sidebar-content">
            <a href="index.html" class="brand-logo">Ephraim Lu</a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="mywork.html">My Work</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html" class="active-page">Contact</a></li>
            </ul>
        </div>
    </nav>

    <main class="contact-container">
        <h1 class="page-title">Contact</h1>
        
        <div class="content-placeholder">
            <div class="contact-hero">
                <p class="contact-intro">Have a question or a project in mind? Let's connect!</p>
                <a href="mailto:ephraimlu2026@gmail.com" class="mail-button">
                    <span>Send a Message</span>
                    <i class="fa-regular fa-paper-plane"></i>
                </a>
            </div>
        </div>

        <footer class="site-footer">
            <div class="footer-content">
                <p>&copy; 2026 Ephraim Lu Photography</p>
                <div class="social-links">
                    <a href="https://www.instagram.com/ephraim.lu_08/" target="_blank"><i class="fab fa-instagram"></i></a>
                    <a href="https://www.linkedin.com/in/ephraim-lu-749319365/" target="_blank"><i class="fab fa-linkedin-in"></i></a>
                </div>
            </div>
        </footer>
    </main>

    <script>
        function toggleMenu() {
            const sidebar = document.getElementById('sidebar');
            const btn = document.querySelector('.menu-toggle');
            sidebar.classList.toggle('active');
            btn.innerHTML = sidebar.classList.contains('active') ? "Close" : "Menu";
        }
    </script>
</body>
</html>
