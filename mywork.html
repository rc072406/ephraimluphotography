    <style>
        :root {
            --bg-primary: #f3f3f4;
            --text-main: #231f20;
            --sidebar-width: 300px;
            --font-serif: 'Cormorant Garamond', serif;
            --transition: 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            --strip-speed: 60s;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-primary);
            color: var(--text-main);
            font-family: var(--font-serif);
            overflow-x: hidden;
        }

        /* SIDEBAR */
        .sidebar {
            position: fixed;
            left: 0; top: 0; bottom: 0;
            width: var(--sidebar-width);
            background: url('https://lightroom.adobe.com/v2c/spaces/9629d67fbae74310a29c500e5955e5e1/assets/18929a38e65345f0b251c432aa867151/revisions/626b50bcf766438096f628e123bf9928/renditions/0be75ba6a71bebf00caf9a34831986a1') no-repeat center center;
            background-size: cover;
            display: flex;
            flex-direction: column; padding: 40px; z-index: 1000;
            transition: transform var(--transition);
        }
        .sidebar::before { content: ""; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.35); z-index: 1; }
        .sidebar-content { position: relative; z-index: 2; height: 100%; display: flex; flex-direction: column; color: #fff; }
        .brand-logo { font-size: 22px; letter-spacing: 5px; text-transform: uppercase; text-decoration: none; color: #fff; margin-bottom: 60px; font-weight: 400; }
        .nav-links { list-style: none; }
        .nav-links li { margin-bottom: 25px; }
        .nav-links a { text-decoration: none; color: #fff; text-transform: uppercase; letter-spacing: 2px; font-size: 13px; transition: all 0.3s; padding: 5px 10px; border-radius: 2px; }
        .nav-links a.active-page { background: rgba(255, 255, 255, 0.15); box-shadow: inset 0 0 10px rgba(0,0,0,0.1); opacity: 1; }
        .nav-links a:hover { opacity: 0.6; }

        /* WORK CONTAINER */
        .work-container {
            margin-left: var(--sidebar-width);
            padding: 40px 0;
            min-height: 100vh;
            display: flex; flex-direction: column; justify-content: center;
            transition: margin-left var(--transition);
        }

        .page-title {
            padding-left: 5%;
            font-size: 32px; text-transform: uppercase; letter-spacing: 4px;
            margin-bottom: 20px; font-weight: 300;
        }

        /* FILM STRIPS */
        .strip-wrapper {
            width: 100%; overflow: hidden; position: relative;
            cursor: pointer; padding: 15px 0;
        }

        .film-strip {
            display: flex; white-space: nowrap;
            width: max-content;
        }

        .strip-top { animation: scrollLeft var(--strip-speed) linear infinite; }
        .strip-bottom { animation: scrollRight var(--strip-speed) linear infinite; }

        .strip-wrapper:hover .film-strip { animation-play-state: paused; }

        .film-item {
            flex: 0 0 auto;
            width: 320px; height: 460px;
            margin: 0 12px;
            background: #e1e1e2; overflow: hidden;
            position: relative;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .film-item:hover { transform: translateY(-15px) scale(1.02); z-index: 10; }

        /* HOVER OVERLAY */
        .item-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.15);
            display: flex; align-items: center; justify-content: center;
            opacity: 0; transition: opacity 0.3s;
        }
        .film-item:hover .item-overlay { opacity: 1; }
        .overlay-text { 
            color: #fff; text-transform: uppercase; letter-spacing: 3px; font-size: 10px;
            padding: 10px 20px; border: 1px solid rgba(255,255,255,0.5);
            background: rgba(0,0,0,0.2); backdrop-filter: blur(2px);
        }

        .film-item img {
            width: 100%; height: 100%; object-fit: cover;
            display: block;
        }

        @keyframes scrollLeft {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        @keyframes scrollRight {
            0% { transform: translateX(-50%); }
            100% { transform: translateX(0); }
        }

        /* LIGHTBOX */
        .lightbox {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(243, 243, 244, 0.98);
            z-index: 2000; display: none; flex-direction: column; align-items: center; justify-content: center;
        }
        .lightbox.active { display: flex; }
        .lightbox-content { max-width: 90%; max-height: 80vh; position: relative; display: flex; align-items: center; }
        .lightbox-img { max-width: 100%; max-height: 80vh; object-fit: contain; box-shadow: 0 30px 60px rgba(0,0,0,0.1); }
        
        .close-lightbox { position: fixed; top: 30px; right: 40px; font-size: 13px; cursor: pointer; text-transform: uppercase; letter-spacing: 3px; opacity: 0.6; }
        .photo-counter { margin-top: 30px; font-size: 12px; letter-spacing: 4px; text-transform: uppercase; opacity: 0.5; }

        .nav-btn { position: fixed; top: 50%; transform: translateY(-50%); font-size: 20px; cursor: pointer; opacity: 0.2; transition: 0.3s; padding: 40px; color: var(--text-main); }
        .nav-btn:hover { opacity: 1; }
        .prev-btn { left: 20px; }
        .next-btn { right: 20px; }

        /* FOOTER */
        .site-footer { margin-left: var(--sidebar-width); padding: 40px 10%; background-color: var(--bg-primary); border-top: 1px solid rgba(0,0,0,0.05); transition: margin-left var(--transition); }
        .footer-content { display: flex; justify-content: space-between; align-items: center; font-size: 11px; letter-spacing: 1px; text-transform: uppercase; opacity: 0.6; }
        .social-links a { color: var(--text-main); text-decoration: none; margin-left: 20px; font-size: 16px; }

        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); width: 80%; }
            .work-container, .site-footer { margin-left: 0; }
            .page-title { padding-top: 100px; }
            .film-item { width: 240px; height: 350px; }
        }
    </style>
</head>

        //  SHUFFLE 
        const uniqueOthers = [...new Set(otherPhotos)].sort(() => Math.random() - 0.5);
        const uniquePhotos = [featuredPhoto, ...uniqueOthers]; // Featured photo is now #1

        const half = Math.ceil(uniquePhotos.length / 2);
        const set1 = uniquePhotos.slice(0, half);
        const set2 = uniquePhotos.slice(half);

        const strip1 = document.getElementById('strip1');
        const strip2 = document.getElementById('strip2');
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightboxImg');
        const counter = document.getElementById('photoCounter');
        let currentIdx = 0;

        //  INTERACTIVE ITEMS
        function createItem(url) {
            const div = document.createElement('div');
            div.className = 'film-item';
            div.innerHTML = `
                <img src="${url}">
                <div class="item-overlay">
                    <span class="overlay-text">View Image</span>
                </div>
            `;
            div.onclick = () => {
                currentIdx = uniquePhotos.indexOf(url);
                updateLightbox();
            };
            return div;
        }

        function populate(element, photos) {
            photos.forEach(url => element.appendChild(createItem(url)));
            photos.forEach(url => element.appendChild(createItem(url))); // Clone for loop
        }

        populate(strip1, set1);
        populate(strip2, set2);

        // 3. LIGHTBOX LOGIC
        function updateLightbox() {
            lightboxImg.src = uniquePhotos[currentIdx];
            const displayIdx = (currentIdx + 1).toString().padStart(2, '0');
            const total = uniquePhotos.length.toString().padStart(2, '0');
            counter.innerText = `${displayIdx} / ${total}`;
            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            lightbox.classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        function changeImg(dir) {
            currentIdx = (currentIdx + dir + uniquePhotos.length) % uniquePhotos.length;
            updateLightbox();
        }

        // 4. EVENTS
        document.addEventListener('keydown', (e) => {
            if (!lightbox.classList.contains('active')) return;
            if (e.key === "ArrowRight") changeImg(1);
            if (e.key === "ArrowLeft") changeImg(-1);
            if (e.key === "Escape") closeLightbox();
        });

        lightbox.addEventListener('click', (e) => {
            if (e.target === lightbox) closeLightbox();
        });
